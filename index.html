<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer ID Card Generator</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .container { background: #fff; padding: 20px; max-width: 600px; width: 100%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
    h2 { color: #28a745; border-bottom: 2px solid #28a745; padding-bottom: 5px; margin-top: 0; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; font-size: 14px; }
    .detail-item { background: #f8f9fa; padding: 10px; border-radius: 4px; border-left: 3px solid #007bff; }
    .detail-item strong { color: #555; display: block; margin-bottom: 3px; }
    .btn { width: 100%; background: #28a745; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
    .btn:hover { background: #218838; }
    
    /* ID Card Style */
    .id-card { width: 350px; background: #fff; border: 2px solid #28a745; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.15); display: none; position: relative; }
    .card-header { background: #28a745; color: white; padding: 10px; text-align: center; font-weight: bold; font-size: 16px; }
    .card-body { padding: 15px; display: flex; gap: 15px; }
    .card-photo { width: 80px; height: 100px; border: 1px solid #ccc; background: #eee; object-fit: cover; border-radius: 4px; }
    .card-info { font-size: 12px; line-height: 1.5; }
    .card-info div { margin-bottom: 4px; }
    .print-btn { background: #007bff; margin-top: 15px; display: none; max-width: 350px; }
    .print-btn:hover { background: #0056b3; }
  </style>
</head>
<body>

  <div class="container" id="dashboard">
    <h2>Farmer Verification Dashboard</h2>
    <div class="detail-grid">
      <div class="detail-item"><strong>Farmer ID</strong><span id="d-id">-</span></div>
      <div class="detail-item"><strong>Enrollment ID</strong><span id="d-enroll">-</span></div>
      <div class="detail-item"><strong>Full Name</strong><span id="d-name">-</span></div>
      <div class="detail-item"><strong>Gender</strong><span id="d-gender">-</span></div>
      <div class="detail-item"><strong>DOB</strong><span id="d-dob">-</span></div>
      <div class="detail-item"><strong>Pincode</strong><span id="d-pin">-</span></div>
      <div class="detail-item" style="grid-column: span 2;"><strong>Address</strong><span id="d-addr">-</span></div>
    </div>
    <button class="btn" id="makeCardBtn">Make Card (Pay ₹30)</button>
  </div>

  <div class="id-card" id="farmerCard">
    <div class="card-header">KISHAN IDENTITY CARD</div>
    <div class="card-body">
      <img id="c-photo" class="card-photo" src="" alt="Farmer Photo">
      <div class="card-info">
        <div><strong>Name:</strong> <span id="c-name"></span></div>
        <div><strong>Farmer ID:</strong> <span id="c-id"></span></div>
        <div><strong>DOB:</strong> <span id="c-dob"></span></div>
        <div><strong>Gender:</strong> <span id="c-gender"></span></div>
        <div><strong>Pincode:</strong> <span id="c-pin"></span></div>
      </div>
    </div>
  </div>
  <button class="btn print-btn" id="printBtn" onclick="window.print()">Print / Save Card</button>

  <script>
    // 1. URL se data catch karke dashboard me bharna
    const urlParams = new URLSearchParams(window.location.search);
    
    const farmerData = {
      id: urlParams.get('id') || 'N/A',
      enroll: urlParams.get('enroll') || 'N/A',
      name: urlParams.get('name') || 'N/A',
      gender: urlParams.get('gender') || 'N/A',
      dob: urlParams.get('dob') || 'N/A',
      addr: urlParams.get('addr') || 'N/A',
      pin: urlParams.get('pin') || 'N/A',
      photo: sessionStorage.getItem('farmerPhoto') || '' // Big base64 photo session me store hogi
    };

    // Dashboard UI me data set karna
    document.getElementById('d-id').innerText = farmerData.id;
    document.getElementById('d-enroll').innerText = farmerData.enroll;
    document.getElementById('d-name').innerText = farmerData.name;
    document.getElementById('d-gender').innerText = farmerData.gender;
    document.getElementById('d-dob').innerText = farmerData.dob;
    document.getElementById('d-addr').innerText = farmerData.addr;
    document.getElementById('d-pin').innerText = farmerData.pin;

    // 2. Make Card & Payment System (Simulated Gateway)
    document.getElementById('makeCardBtn').addEventListener('click', () => {
      alert("Redirecting to Secure Payment Gateway...\nAmount: ₹30.00");
      
      // Yahan aap real me Razorpay ki script use kar sakte hain. 
      // Abhi testing ke liye hum 1.5 second ka fake processing loader chala rahe hain.
      let paymentSuccess = confirm("Payment Gateway: Kya aap ₹30 ka payment approve karna chahte hain?");
      
      if(paymentSuccess) {
        alert("🎉 Payment Successful! Generating your Card...");
        
        // Dashboard chhupana aur Card dikhana
        document.getElementById('dashboard').style.display = 'none';
        
        document.getElementById('c-name').innerText = farmerData.name;
        document.getElementById('c-id').innerText = farmerData.id;
        document.getElementById('c-dob').innerText = farmerData.dob;
        document.getElementById('c-gender').innerText = farmerData.gender;
        document.getElementById('c-pin').innerText = farmerData.pin;
        if(farmerData.photo) {
          document.getElementById('c-photo').src = farmerData.photo;
        }

        document.getElementById('farmerCard').style.display = 'block';
        document.getElementById('printBtn').style.style.display = 'block';
      } else {
        alert("❌ Payment Cancelled/Failed!");
      }
    });
  </script>
</body>
</html>
